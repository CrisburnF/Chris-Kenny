<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crisburn & Kenny | Save The Date</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --sage:#9CAF88;
  --beige:#f4efe8;
  --cream:#fffaf3;
  --gold:#c6a85a;
  --shadow:rgba(0,0,0,0.15);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at center, #f8f4ee 0%, #eae3d9 100%);
  font-family:'Playfair Display', serif;
  overflow:hidden;
}

/* Scene Perspective */
.scene{
  perspective:1200px;
}

/* Envelope Container */
.envelope-wrapper{
  width:320px;
  height:220px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1.5s cubic-bezier(.68,-0.55,.27,1.55);
}

/* Envelope Base */
.envelope{
  width:100%;
  height:100%;
  background:var(--sage);
  position:absolute;
  bottom:0;
  border-radius:6px;
  box-shadow:0 15px 35px var(--shadow);
  overflow:hidden;
}

/* Envelope Flap */
.flap{
  width:100%;
  height:120px;
  background:linear-gradient(to bottom, #aabf97, var(--sage));
  position:absolute;
  top:0;
  left:0;
  transform-origin:top;
  transition:transform 1.8s cubic-bezier(.68,-0.55,.27,1.55);
  clip-path:polygon(0 0,100% 0,50% 100%);
}

/* Card */
.card{
  width:90%;
  height:240px;
  background:var(--cream);
  position:absolute;
  left:5%;
  bottom:-200px;
  border-radius:8px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  transition:transform 1.8s cubic-bezier(.68,-0.55,.27,1.55);
}

/* Text Styling */
.names{
  font-family:'Great Vibes', cursive;
  font-size:38px;
  background:linear-gradient(45deg,var(--gold),#e6d18f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
}

.save{
  letter-spacing:3px;
  font-size:14px;
  margin-bottom:10px;
}

.date{
  font-size:18px;
  margin-top:8px;
}

/* Button */
.open-btn{
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 25px;
  border:none;
  background:linear-gradient(45deg,var(--gold),#e6d18f);
  color:white;
  border-radius:25px;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:all .3s ease;
}

.open-btn:hover{
  transform:translateX(-50%) scale(1.05);
}

/* Open Animation */
.open .flap{
  transform:rotateX(-180deg);
}

.open .card{
  transform:translateY(-220px);
}

/* Subtle floating particles */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:rgba(255,255,255,0.6);
  border-radius:50%;
  animation:float 8s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-20px);}
  100%{transform:translateY(0px);}
}

/* Responsive */
@media(max-width:480px){
  .envelope-wrapper{
    width:260px;
    height:180px;
  }
}
</style>
</head>
<body>

<div class="scene">
  <div class="envelope-wrapper" id="envelope">
    <div class="envelope"></div>
    <div class="flap"></div>

    <div class="card">
      <div class="names">Crisburn & Kenny</div>
      <div class="save">SAVE THE DATE</div>
      <div class="date">28th December 2027</div>
    </div>

    <button class="open-btn" onclick="openEnvelope()">Open Invitation</button>
  </div>
</div>

<script>
function openEnvelope(){
  document.getElementById("envelope").classList.toggle("open");
}

/* Generate floating particles */
for(let i=0;i<15;i++){
  const p=document.createElement("div");
  p.classList.add("particle");
  p.style.top=Math.random()*100+"%";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
